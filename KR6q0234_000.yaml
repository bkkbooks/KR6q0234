body:
  text: 正覺潤光澤禪師澡雪集序粵形諸言句謂之文字禪鏟去言句謂之祖師禪總然鏤塵雕雪得無眼中金屑耳從上千七百則諸方正襟而談言句乎文字乎潤翁大師究竟窮極不存軌則於是向日用酬答中或行吟澤畔或臥病床頭不覺成帙甲子秋抄余歸自洞庭聞師遷化人琴之感涕泗滂沱適上人春臺詣余袖出册曰此先師澡雪集也欲謀剞劂知公與先師最善乞一言以辨諸册余曰諸方用升堂入室為傳心大師以詩歌尺牘作佛事耶閲之語語風來層層空到文冶丹融詞珠露合古今雅俗泚筆皆佳沛公殆天授非人力乎至於綽虹布橋食肉帶刺冷哨打世邊鼓撾人不疼不癢處真有涕腐墳之海淚斬猿圈之利鋒若夫向夕陽古道乞一文錢于衰柳寒蟬修五供養木土堊丹一期心血水月鏡花半世行履此亦苾芻之急務也余塤箎此集若有獲心者得澡雪則作者傳者亦勝禮懺三年矣爰命受梨以傳不朽但能了然一句勿誇念佛千聲世人眼開大師眉舞康熙乙丑仲春上浣之吉髮弟陳聞道沐手敬題正覺潤光澤禪師澡雪集目録序七言古七言律山居五言律山居七言絶口鼓子歌示徒書問雜著廣東和尚泡影集序自狀辭世偈康熙庚辰冬日板存浙江嘉興府楞嚴寺大藏經坊
